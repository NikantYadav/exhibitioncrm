workflows:
  ios-sideload:
    name: iOS IPA (Sideload)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        FLUTTER_VERSION: "3.44.2"
        BUNDLE_ID: com.example.exono
      groups:
        - app_secrets   # group name you created in Codemagic UI (holds SUPABASE_URL, SUPABASE_ANON_KEY, API_BASE_URL, SENTRY_DSN, UXCAM_APP_KEY)
      flutter: $FLUTTER_VERSION
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          cd exono
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd exono/ios
          pod install

      - name: Flutter analyze
        script: |
          cd exono
          flutter analyze --no-fatal-infos

      - name: Build unsigned IPA
        script: |
          cd exono

          # Build the .app bundle without code signing
          flutter build ios --release --no-codesign \
            --obfuscate --split-debug-info=build/debug-symbols \
            --build-name=1.0.0 \
            --build-number=1 \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=UXCAM_APP_KEY="$UXCAM_APP_KEY"

          # Fail loudly if the build did not produce the .app (avoids a bogus empty IPA)
          if [ ! -d build/ios/iphoneos/Runner.app ]; then
            echo "ERROR: Runner.app was not produced — the iOS build failed above."
            exit 1
          fi

          # Package it into an IPA manually (required for sideloading)
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r Exono.ipa Payload

    artifacts:
      - exono/build/ios/ipa/Exono.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - varuog@gmail.com
        notify:
          success: true
          failure: true
