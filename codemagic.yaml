workflows:
  ios-sideload:
    name: iOS IPA (Sideload)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        FLUTTER_VERSION: "3.32.0"
        BUNDLE_ID: com.example.exono
        API_BASE_URL: https://exhibitioncrm.vercel.app/api
      # Add SUPABASE_URL and SUPABASE_ANON_KEY as secret environment variables
      # in the Codemagic UI under Environment variables (mark both as "Secret")
      flutter: $FLUTTER_VERSION
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          cd exono
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd exono/ios
          pod install

      - name: Flutter analyze
        script: |
          cd exono
          flutter analyze --no-fatal-infos

      - name: Build unsigned IPA
        script: |
          cd exono

          # Build the .app bundle without code signing
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=1 \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL"

          # Package it into an IPA manually (required for sideloading)
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r Exono.ipa Payload

    artifacts:
      - exono/build/ios/ipa/Exono.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - varuog@gmail.com
        notify:
          success: true
          failure: true
