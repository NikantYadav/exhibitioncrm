<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile h-14 w-full bg-surface border-b border-outline-variant">
<button class="text-primary hover:opacity-80 active:scale-95 transition-all">

</button>
<span class="font-display-wordmark text-display-wordmark text-primary tracking-tighter">EXONO</span>
<button class="text-on-surface-variant hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="pt-20 px-margin-mobile max-w-lg mx-auto space-y-8">
<!-- Contact Identity Bar -->
<section class="bg-surface-container-low border border-outline-variant p-4 flex items-center gap-4 rounded-lg">
<div class="relative w-14 h-14 shrink-0 bg-surface-container-high border border-outline flex items-center justify-center rounded">

<div class="flex-grow">

<p class="font-label-sm text-label-sm text-on-surface-variant uppercase">Quantum Dynamics Inc.</p>
<div class="flex gap-2 mt-2">
<span class="font-label-xs text-label-xs px-2 py-0.5 border border-white text-white uppercase tracking-wider">Met</span>
<span class="font-label-xs text-label-xs px-2 py-0.5 border border-outline-variant text-on-surface-variant uppercase tracking-wider">Follow-Up</span>
</div>
</div>
</section>
<!-- Form Fields -->
<div class="space-y-6">
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase block">Event Context</label>
<div class="w-full h-12 bg-surface-container-lowest border border-outline-variant flex items-center px-4 text-on-surface-variant font-body-md text-body-md rounded-lg">
                    Global Tech Summit 2024
                    <span class="material-symbols-outlined ml-auto text-on-surface-variant/50" style="font-size: 18px;">lock</span>
</div>
</div>
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase block">Product Interest</label>
<div class="relative group">
<select class="w-full h-12 bg-surface border border-outline-variant px-4 appearance-none focus:outline-none focus:border-primary font-body-md text-body-md text-primary transition-colors cursor-pointer rounded-lg">
<option>Core Platform v2</option>
<option>Enterprise API Suite</option>
<option>Edge Intelligence Module</option>
<option>Add new product</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- Capture Notes Section -->
<section class="space-y-4">
<h3 class="font-label-sm text-label-sm text-primary uppercase border-l-2 border-primary pl-3">Capture Notes</h3>
<!-- Tabs -->
<div class="flex border-b border-outline-variant"><button class="flex-1 py-3 font-label-sm text-label-sm uppercase tracking-widest text-primary relative" id="tab-manual" onclick="switchTab('manual')" style="z-index: 10; opacity: 0;">Manual<div class="absolute bottom-[-1px] left-0 right-0 h-[2px] bg-primary"></div></button><button class="flex-1 py-3 font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors relative" id="tab-voice" onclick="switchTab('voice')">Voice</button><button class="flex-1 py-3 font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors relative" id="tab-upload" onclick="switchTab('upload')">Upload</button></div>
<!-- Tab Content: Manual -->
<div class="tab-content block" id="content-manual">
<textarea class="w-full h-40 bg-surface-container-low border border-outline-variant p-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary transition-colors resize-none rounded-lg" placeholder="Key topics discussed, what they need, agreed next steps..."></textarea>
</div>
<!-- Tab Content: Voice -->
<div class="tab-content hidden h-56 flex flex-col items-center justify-center bg-surface-container-low border border-outline-variant py-4" id="content-voice">
<button class="w-16 h-16 rounded-full border border-primary flex items-center justify-center text-primary active:scale-90 transition-transform mb-4">

</button>

<div class="waveform-bar w-1 bg-primary"></div>
<div class="waveform-bar w-1 bg-primary"></div>
<div class="waveform-bar w-1 bg-primary"></div>
<div class="waveform-bar w-1 bg-primary"></div>
<div class="waveform-bar w-1 bg-primary"></div>
<div class="waveform-bar w-1 bg-primary"></div>
</div>
<span class="font-body-lg text-body-lg text-primary mt-2">00:12</span>
<span class="font-label-xs text-label-xs text-on-surface-variant mt-1 uppercase">Tap to stop</span>
</div>
<!-- Tab Content: Upload -->
<div class="tab-content hidden h-40 flex flex-col items-center justify-center bg-surface-container-low border border-dashed border-outline-variant hover:border-primary transition-colors cursor-pointer group" id="content-upload">

<span class="material-symbols-outlined" style="font-size: 18px;">save</span>

</div>

<span class="material-symbols-outlined">person</span>
<span class="font-label-xs text-label-xs uppercase">Profile</span>
</div>

<script>
        function switchTab(tabId) {
            // Hide all contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
                content.classList.remove('block');
            });
            
            // Reset tab styles
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.classList.remove('text-primary', 'border-b-2', 'border-primary');
                btn.classList.add('text-on-surface-variant');
            });

            // Show selected content
            document.getElementById('content-' + tabId).classList.remove('hidden');
            if (tabId === 'voice' || tabId === 'upload') {
                document.getElementById('content-' + tabId).classList.add('flex');
            } else {
                document.getElementById('content-' + tabId).classList.add('block');
            }

            // Set active tab style
            const activeBtn = document.getElementById('tab-' + tabId);
            activeBtn.classList.add('text-primary', 'border-b-2', 'border-primary');
            activeBtn.classList.remove('text-on-surface-variant');
        }

        // Ripple / Active micro-interaction for Save button
        const saveBtn = document.querySelector('button.bg-primary');
        saveBtn.addEventListener('click', () => {
            saveBtn.innerHTML = '<span>Processing...</span><span class="material-symbols-outlined animate-spin" style="font-size: 18px;">sync</span>';
            setTimeout(() => {
                saveBtn.innerHTML = '<span>Lead Saved</span><span class="material-symbols-outlined" style="font-size: 18px;">check_circle</span>';
                saveBtn.classList.replace('bg-primary', 'bg-green-600');
            }, 1200);
        });
    </script>
