site_name: SLayer
site_description: A lightweight semantic layer for AI agents
site_url: https://motley-slayer.readthedocs.io
repo_url: https://github.com/motleyai/slayer
repo_name: motleyai/slayer
edit_uri: edit/main/docs/

theme:
  name: readthedocs
  logo: https://raw.githubusercontent.com/MotleyAI/slayer/refs/heads/main/docs/SLayer.png

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - MCP (AI Agents): getting-started/mcp.md
      - CLI (Terminal): getting-started/cli.md
      - REST API (Any Language): getting-started/rest-api.md
      - Python SDK: getting-started/python.md
  - Concepts:
      - Terminology: concepts/terminology.md
      - Models: concepts/models.md
      - Queries: concepts/queries.md
      - Formulas: concepts/formulas.md
      - References (SQL vs DSL): concepts/references.md
      - Auto-Ingestion: concepts/ingestion.md
      - Schema Drift: concepts/schema-drift.md
      - Memories: concepts/memories.md
      - Search: concepts/search.md
  - Reference:
      - MCP Server: reference/mcp.md
      - REST API: reference/rest-api.md
      - Python Client: reference/python-client.md
      - CLI: reference/cli.md
      - Database Support: database-support.md
  - Wire Protocols (BI Tools):
      - Flight SQL: interfaces/flight-sql.md
      - Postgres Facade: interfaces/pg-facade.md
  - dbt:
      - SLayer vs dbt: dbt/slayer_vs_dbt.md
      - Importing dbt definitions: dbt/dbt_import.md
  - Tutorials:
      - Make it dynamic: examples/01_dynamic/dynamic.md
      - SQL vs DSL:
          - examples/02_sql_vs_dsl/sql_vs_dsl.md
          - Notebook: examples/02_sql_vs_dsl/sql_vs_dsl_nb.ipynb
      - Auto-Ingestion:
          - examples/03_auto_ingest/auto_ingest.md
          - Notebook: examples/03_auto_ingest/auto_ingest_nb.ipynb
      - Time Dimensions:
          - examples/04_time/time.md
          - Notebook: examples/04_time/time_nb.ipynb
      - Joins:
          - examples/05_joins/joins.md
          - Notebook: examples/05_joins/joins_nb.ipynb
      - Joined Measures:
          - examples/05_joined_measures/joined_measures.md
          - Notebook: examples/05_joined_measures/joined_measures_nb.ipynb
      - Multistage Queries:
          - examples/06_multistage_queries/multistage_queries.md
          - Notebook: examples/06_multistage_queries/multistage_queries_nb.ipynb
      - Aggregations:
          - examples/07_aggregations/aggregations.md
          - Notebook: examples/07_aggregations/aggregations_nb.ipynb
      - Lightning Talk:
          - examples/09_lightning_talk/lightning_talk.md
          - Notebook: examples/09_lightning_talk/lightning_talk_nb.ipynb
      - Schema Drift (worked example): examples/schema-drift.md
  - Configuration:
      - Datasources: configuration/datasources.md
      - Storage Backends: configuration/storage.md
  - Development: development.md

plugins:
  - search
  - section-index
  - mkdocs-jupyter:
      include_source: true
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true
