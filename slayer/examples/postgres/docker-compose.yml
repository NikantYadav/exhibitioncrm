services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slayer_demo
      POSTGRES_USER: slayer
      POSTGRES_PASSWORD: slayer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slayer -d slayer_demo"]
      interval: 2s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: ../..
    command: python /examples/seed.py postgresql://slayer:slayer@postgres:5432/slayer_demo
    volumes:
      - ../seed.py:/examples/seed.py:ro
    depends_on:
      postgres:
        condition: service_healthy

  slayer:
    build:
      context: ../..
    command: sh /examples/start.sh
    ports:
      - "5143:5143"
    volumes:
      - ./start.sh:/examples/start.sh:ro
      - ./slayer_data:/data
    depends_on:
      seed:
        condition: service_completed_successfully
